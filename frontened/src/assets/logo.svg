<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  
  <!-- Motion lines -->
  <g transform="translate(20, 55)">
    <circle cx="0" cy="0" r="3" fill="#1e40af"/>
    <circle cx="12" cy="-3" r="3" fill="#1e40af" opacity="0.8"/>
    <circle cx="24" cy="-6" r="3" fill="#1e40af" opacity="0.6"/>
    <line x1="35" y1="-8" x2="50" y2="-8" stroke="#1e40af" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <line x1="35" y1="0" x2="50" y2="0" stroke="#1e40af" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
    <line x1="35" y1="8" x2="50" y2="8" stroke="#1e40af" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
  </g>
  
  <!-- Hexagon -->
  <polygon points="95,10 140,27.5 140,72.5 95,90 50,72.5 50,27.5" fill="none" stroke="url(#hexGradient)" stroke-width="4"/>
  
  <!-- Code tags -->
  <g transform="translate(88, 58)" fill="#1e3a8a">
    <path d="M-20,-15 L-8,0 L-20,15 M-5,-15 L7,0 L-5,15 M10,-15 L18,-8"/>
  </g>
  
  <!-- Magnifying glass -->
  <g transform="translate(125, 70)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1e3a8a" stroke-width="3"/>
    <path d="M-8,-8 L8,8 M-14,-6 L-6,-14" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="18" y1="18" x2="35" y2="35" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
    <!-- Search lines inside magnifier -->
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#0891b2" stroke-width="2"/>
    <line x1="-8" y1="0" x2="6" y2="0" stroke="#0891b2" stroke-width="2"/>
    <line x1="-6" y1="5" x2="4" y2="5" stroke="#0891b2" stroke-width="2"/>
    <line x1="-4" y1="10" x2="2" y2="10" stroke="#0891b2" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="185" y="48" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e3a8a">Code</text>
  <text x="185" y="85" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#textGradient)">Analyzer</text>
</svg>